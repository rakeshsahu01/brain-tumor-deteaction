services:
  - type: web
    name: brain-tumor-detection
    env: python
    plan: free
    buildCommand: >
      pip install --upgrade pip setuptools wheel &&
      pip install -r requirements.txt &&
      cd client && npm install && npm run build && cd ..
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: FLASK_ENV
        value: production
    autoDeploy: true
