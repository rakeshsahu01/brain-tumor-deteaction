services:
  - type: web
    name: brain-tumor-detection
    env: python
    plan: free
    buildCommand: >
      pip install --no-cache-dir --no-build-isolation -r requirements.txt &&
      cd client && npm install && npm run build && cd ..
    startCommand: gunicorn --workers 1 --worker-class sync --timeout 300 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
    autoDeploy: true
